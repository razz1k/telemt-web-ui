services:
  telemt:
    image: ghcr.io/telemt/telemt:latest
    container_name: telemt
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "443:443"
    working_dir: /etc/telemt
    volumes:
      - ./config:/etc/telemt
      - telemt_data:/var/lib/telemt
    environment:
      - RUST_LOG=info
    healthcheck:
      test:
        [
          "CMD",
          "/app/telemt",
          "healthcheck",
          "/etc/telemt/config.toml",
          "--mode",
          "liveness",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 262144
    networks:
      - telemt_net

  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    container_name: telemt-web-api
    restart: unless-stopped
    environment:
      API_PORT: "3000"
      UID: ${UID:-1000}
      GID: ${GID:-1000}
      TELEMT_API_URL: http://telemt:9091
      TELEMT_METRICS_URL: http://telemt:9092
      TELEMT_CONFIG_PATH: /etc/telemt/config.toml
      TELEMT_API_AUTH: ${TELEMT_API_AUTH:-}
      WEB_UI_PASSWORD: ${WEB_UI_PASSWORD:-}
      UI_DB_PATH: /var/lib/telemt-web-ui/state.db
    volumes:
      - ./config:/etc/telemt
      - ./data:/var/lib/telemt-web-ui
    depends_on:
      telemt:
        condition: service_started
    networks:
      - telemt_net

  web:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.web
    container_name: telemt-web-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - telemt_net

volumes:
  telemt_data:

networks:
  telemt_net:
    driver: bridge
