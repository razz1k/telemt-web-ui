services:
  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    container_name: telemt-web-api-external
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      API_PORT: "3000"
      TELEMT_API_URL: ${TELEMT_API_URL:-http://host.docker.internal:9091}
      TELEMT_METRICS_URL: ${TELEMT_METRICS_URL:-http://host.docker.internal:9092}
      TELEMT_CONFIG_PATH: ${TELEMT_CONFIG_PATH:-/etc/telemt/config.toml}
      TELEMT_API_AUTH: ${TELEMT_API_AUTH:-}
      WEB_UI_PASSWORD: ${WEB_UI_PASSWORD:-}
      UI_DB_PATH: /var/lib/telemt-web-ui/state.db
    volumes:
      - ./config:/etc/telemt:ro
      - ./data:/var/lib/telemt-web-ui
    networks:
      - telemt_net

  web:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.web
    container_name: telemt-web-ui-external
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - api
    networks:
      - telemt_net

networks:
  telemt_net:
    external: true
    name: telemt-web-ui_telemt_net
